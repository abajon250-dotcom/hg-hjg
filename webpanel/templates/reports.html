{% extends "base.html" %}
{% block title %}Отчёты{% endblock %}
{% block content %}
<h2 class="mb-4">📄 Генерация отчётов</h2>
<div class="card p-4">
    <div class="row">
        <div class="col-md-6">
            <button class="btn btn-primary w-100 mb-3" onclick="location.href='/reports/generate?type=daily'">📅 Отчёт за день</button>
        </div>
        <div class="col-md-6">
            <button class="btn btn-primary w-100 mb-3" onclick="location.href='/reports/generate?type=weekly'">📆 Отчёт за неделю</button>
        </div>
        <div class="col-md-6">
            <button class="btn btn-primary w-100" onclick="location.href='/reports/generate?type=monthly'">📊 Отчёт за месяц</button>
        </div>
        <div class="col-md-6">
            <button class="btn btn-secondary w-100" onclick="location.href='/reports/export'">📤 Экспорт всех данных (CSV)</button>
        </div>
    </div>
</div>
{% endblock %}
